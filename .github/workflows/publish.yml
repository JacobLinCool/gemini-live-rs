name: Publish

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xfixes0-dev \
            libxcb-composite0-dev \
            libxcb-shape0-dev \
            libdrm-dev \
            libgbm-dev \
            libegl-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            cmake \
            meson \
            ninja-build

      - name: Test before publish
        run: cargo test --workspace

      - name: Publish gemini-live
        run: cargo publish -p gemini-live
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish gemini-live-cli
        run: cargo publish -p gemini-live-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
